spring:
  ai:
    openai:
      # 配置 API Key（可通过环境变量 OPENAI_API_KEY 覆盖）
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      # 配置 Base URL（兼容各种 OpenAI 兼容的 API）
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          # 默认模型
          model: ${AI_MODEL:gpt-4o}
          # 温度控制创造性
          temperature: 0.7
          # 最大 token 数
          max-tokens: 4096
          # top_p 采样
          top-p: 0.9
    # 聊天客户端配置
    chat:
      client:
        # 启用观察性
        observation-enabled: false

# 自定义配置
custom:
  ai:
    # 消息压缩配置
    message-compression:
      enabled: true
      max-history-messages: 10
      summary-trigger-threshold: 8
    # Skill 配置
    skills:
      enabled: true
      scan-packages: com.example.ai.skills
