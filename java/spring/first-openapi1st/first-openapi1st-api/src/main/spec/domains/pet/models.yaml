PetStatus:
  type: string
  enum:
    - available
    - pending
    - sold

Category:
  type: object
  properties:
    id:
      $ref: '../../openapi-full.yaml#/components/schemas/ResourceId'
    name:
      type: string

Tag:
  type: object
  properties:
    id:
      $ref: '../../openapi-full.yaml#/components/schemas/ResourceId'
    name:
      type: string

Pet:
  type: object
  required:
    - name
    - status
  properties:
    id:
      $ref: '../../openapi-full.yaml#/components/schemas/ResourceId'
    name:
      type: string
    status:
      $ref: '../../openapi-full.yaml#/components/schemas/PetStatus'
    category:
      $ref: '../../openapi-full.yaml#/components/schemas/Category'
    tags:
      type: array
      items:
        $ref: '../../openapi-full.yaml#/components/schemas/Tag'
    photoUrls:
      type: array
      items:
        type: string
        format: uri
    createdAt:
      $ref: '../../openapi-full.yaml#/components/schemas/Timestamp'
    updatedAt:
      $ref: '../../openapi-full.yaml#/components/schemas/Timestamp'

PetListResponse:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: '../../openapi-full.yaml#/components/schemas/Pet'
    page:
      $ref: '../../openapi-full.yaml#/components/schemas/PageMeta'

CreatePetRequest:
  type: object
  required:
    - name
    - status
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
    status:
      $ref: '../../openapi-full.yaml#/components/schemas/PetStatus'
    categoryId:
      $ref: '../../openapi-full.yaml#/components/schemas/ResourceId'
    tagIds:
      type: array
      items:
        $ref: '../../openapi-full.yaml#/components/schemas/ResourceId'
    photoUrls:
      type: array
      items:
        type: string
        format: uri

UpdatePetRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
    status:
      $ref: '../../openapi-full.yaml#/components/schemas/PetStatus'
    categoryId:
      $ref: '../../openapi-full.yaml#/components/schemas/ResourceId'
    tagIds:
      type: array
      items:
        $ref: '../../openapi-full.yaml#/components/schemas/ResourceId'
    photoUrls:
      type: array
      items:
        type: string
        format: uri
