paths:
  /store/orders:
    get:
      operationId: listOrders
      summary: List orders for current user
      tags: [store]
      parameters:
        - $ref: '../../openapi-full.yaml#/components/parameters/PageNum'
        - $ref: '../../openapi-full.yaml#/components/parameters/PageSize'
        - name: status
          in: query
          required: false
          schema:
            $ref: '../../openapi-full.yaml#/components/schemas/OrderStatus'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../../openapi-full.yaml#/components/schemas/OrderListResponse'
    post:
      operationId: placeOrder
      summary: Place a new order
      tags: [store]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../openapi-full.yaml#/components/schemas/PlaceOrderRequest'
      responses:
        '201':
          description: Order placed
          content:
            application/json:
              schema:
                $ref: '../../openapi-full.yaml#/components/schemas/Order'
        '400':
          description: Invalid order
          content:
            application/json:
              schema:
                $ref: '../../openapi-full.yaml#/components/schemas/ErrorResponse'

  /store/orders/{orderId}:
    get:
      operationId: getOrderById
      summary: Get order by ID
      tags: [store]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            $ref: '../../openapi-full.yaml#/components/schemas/ResourceId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../../openapi-full.yaml#/components/schemas/Order'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '../../openapi-full.yaml#/components/schemas/ErrorResponse'
