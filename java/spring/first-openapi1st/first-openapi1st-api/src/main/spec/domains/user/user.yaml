paths:
  /users:
    get:
      operationId: listUsers
      summary: List users with pagination
      tags: [user]
      parameters:
        - $ref: '../../openapi-full.yaml#/components/parameters/PageNum'
        - $ref: '../../openapi-full.yaml#/components/parameters/PageSize'
        - name: status
          in: query
          required: false
          schema:
            $ref: '../../openapi-full.yaml#/components/schemas/UserStatus'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../../openapi-full.yaml#/components/schemas/UserListResponse'
    post:
      operationId: createUser
      summary: Create a new user
      tags: [user]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../openapi-full.yaml#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '../../openapi-full.yaml#/components/schemas/User'
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '../../openapi-full.yaml#/components/schemas/ErrorResponse'

  /users/{userId}:
    get:
      operationId: getUserById
      summary: Get user by ID
      tags: [user]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '../../openapi-full.yaml#/components/schemas/ResourceId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../../openapi-full.yaml#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '../../openapi-full.yaml#/components/schemas/ErrorResponse'
