UserStatus:
  type: string
  enum:
    - active
    - inactive
    - banned

User:
  type: object
  required:
    - username
    - email
  properties:
    id:
      $ref: '../../openapi-full.yaml#/components/schemas/ResourceId'
    username:
      type: string
      minLength: 3
      maxLength: 50
    email:
      type: string
      format: email
    phone:
      type: string
    status:
      $ref: '../../openapi-full.yaml#/components/schemas/UserStatus'
    createdAt:
      $ref: '../../openapi-full.yaml#/components/schemas/Timestamp'

UserListResponse:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: '../../openapi-full.yaml#/components/schemas/User'
    page:
      $ref: '../../openapi-full.yaml#/components/schemas/PageMeta'

CreateUserRequest:
  type: object
  required:
    - username
    - email
    - phone
  properties:
    username:
      type: string
      minLength: 3
      maxLength: 50
    email:
      type: string
      format: email
    phone:
      type: string
