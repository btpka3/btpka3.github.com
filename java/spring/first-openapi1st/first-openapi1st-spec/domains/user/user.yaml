paths:
  /users:
    get:
      operationId: listUsers
      summary: List users with pagination
      tags: [user]
      parameters:
        - $ref: '../../components/parameters/common-params.yaml#/PageNum'
        - $ref: '../../components/parameters/common-params.yaml#/PageSize'
        - name: status
          in: query
          required: false
          schema:
            $ref: './models.yaml#/UserStatus'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: './models.yaml#/UserListResponse'
    post:
      operationId: createUser
      summary: Create a new user
      tags: [user]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './models.yaml#/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: './models.yaml#/User'
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '../../components/schemas/error.yaml#/ErrorResponse'

  /users/{userId}:
    get:
      operationId: getUserById
      summary: Get user by ID
      tags: [user]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '../../components/schemas/common.yaml#/ResourceId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: './models.yaml#/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '../../components/schemas/error.yaml#/ErrorResponse'
