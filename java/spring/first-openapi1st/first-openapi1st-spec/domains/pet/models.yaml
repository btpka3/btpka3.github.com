PetStatus:
  type: string
  enum:
    - available
    - pending
    - sold

Category:
  type: object
  properties:
    id:
      $ref: '../../components/schemas/common.yaml#/ResourceId'
    name:
      type: string
      example: "Dogs"

Tag:
  type: object
  properties:
    id:
      $ref: '../../components/schemas/common.yaml#/ResourceId'
    name:
      type: string
      example: "friendly"

Pet:
  type: object
  required:
    - name
    - status
  properties:
    id:
      $ref: '../../components/schemas/common.yaml#/ResourceId'
    name:
      type: string
      example: "Buddy"
    status:
      $ref: '#/PetStatus'
    category:
      $ref: '#/Category'
    tags:
      type: array
      items:
        $ref: '#/Tag'
    photoUrls:
      type: array
      items:
        type: string
        format: uri
    createdAt:
      $ref: '../../components/schemas/common.yaml#/Timestamp'
    updatedAt:
      $ref: '../../components/schemas/common.yaml#/Timestamp'

PetListResponse:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: '#/Pet'
    page:
      $ref: '../../components/schemas/pagination.yaml#/PageMeta'

CreatePetRequest:
  type: object
  required:
    - name
    - status
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
    status:
      $ref: '#/PetStatus'
    categoryId:
      $ref: '../../components/schemas/common.yaml#/ResourceId'
    tagIds:
      type: array
      items:
        $ref: '../../components/schemas/common.yaml#/ResourceId'
    photoUrls:
      type: array
      items:
        type: string
        format: uri

UpdatePetRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
    status:
      $ref: '#/PetStatus'
    categoryId:
      $ref: '../../components/schemas/common.yaml#/ResourceId'
    tagIds:
      type: array
      items:
        $ref: '../../components/schemas/common.yaml#/ResourceId'
    photoUrls:
      type: array
      items:
        type: string
        format: uri
