PageNum:
  name: pageNum
  in: query
  required: false
  schema:
    type: integer
    minimum: 1
    default: 1

PageSize:
  name: pageSize
  in: query
  required: false
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 20

TraceId:
  name: X-Trace-Id
  in: header
  required: false
  schema:
    type: string
    format: uuid
